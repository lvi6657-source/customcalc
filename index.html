<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CustomCalc Studio</title>
    <!-- Отладочный перехватчик ошибок для Capacitor (Diagnostics) -->
    <script>
      window.addEventListener('error', function(e) {
        var diagnostics = document.getElementById('error-diagnostics');
        if (!diagnostics) {
          diagnostics = document.createElement('div');
          diagnostics.id = 'error-diagnostics';
          diagnostics.style.position = 'fixed';
          diagnostics.style.bottom = '20px';
          diagnostics.style.left = '20px';
          diagnostics.style.right = '20px';
          diagnostics.style.backgroundColor = '#7f1d1d';
          diagnostics.style.color = '#fef2f2';
          diagnostics.style.padding = '15px';
          diagnostics.style.borderRadius = '8px';
          diagnostics.style.zIndex = '999999';
          diagnostics.style.fontFamily = 'monospace';
          diagnostics.style.fontSize = '12px';
          diagnostics.style.overflow = 'auto';
          diagnostics.style.maxHeight = '50vh';
          diagnostics.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.5)';
          diagnostics.style.border = '1px solid #f87171';
          document.body.appendChild(diagnostics);
        }
        var message = document.createElement('div');
        message.style.marginBottom = '8px';
        message.style.borderBottom = '1px solid #b91c1c';
        message.style.paddingBottom = '4px';
        message.innerHTML = '<strong>[Uncaught Error]:</strong> ' + e.message + '<br><small>at ' + e.filename + ':' + e.lineno + ':' + e.colno + '</small>';
        diagnostics.appendChild(message);
      });

      window.addEventListener('unhandledrejection', function(e) {
        var diagnostics = document.getElementById('error-diagnostics');
        if (!diagnostics) {
          diagnostics = document.createElement('div');
          diagnostics.id = 'error-diagnostics';
          diagnostics.style.position = 'fixed';
          diagnostics.style.bottom = '20px';
          diagnostics.style.left = '20px';
          diagnostics.style.right = '20px';
          diagnostics.style.backgroundColor = '#7f1d1d';
          diagnostics.style.color = '#fef2f2';
          diagnostics.style.padding = '15px';
          diagnostics.style.borderRadius = '8px';
          diagnostics.style.zIndex = '999999';
          diagnostics.style.fontFamily = 'monospace';
          diagnostics.style.fontSize = '12px';
          diagnostics.style.overflow = 'auto';
          diagnostics.style.maxHeight = '50vh';
          diagnostics.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.5)';
          diagnostics.style.border = '1px solid #f87171';
          document.body.appendChild(diagnostics);
        }
        var message = document.createElement('div');
        message.style.marginBottom = '8px';
        message.style.borderBottom = '1px solid #b91c1c';
        message.style.paddingBottom = '4px';
        message.innerHTML = '<strong>[Promise Rejection]:</strong> ' + (e.reason ? (e.reason.message || e.reason) : 'No reason');
        diagnostics.appendChild(message);
      });
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #0f172a; /* Slate 900 */
        color: #f1f5f9; /* Slate 100 */
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
